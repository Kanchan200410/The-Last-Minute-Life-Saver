<!DOCTYPE html>
<html>
<head>
    <title>Add Task</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>

<nav class="navbar">
    <h2>🚀 Last Minute Life Saver</h2>

    <div>
        <a href="/">Dashboard</a>
        <a href="/tasks">Tasks</a>
    </div>
</nav>

<div class="container">

    <div class="task-card">

        <h1>Add New Task</h1>

        <form action="/add-task" method="POST">

            <label>Task Title</label>
            <br>

            <input type="text"
                   name="title"
                   required>

            <br><br>

            <label>Description</label>
            <br>

            <textarea
                name="description"
                rows="5">
            </textarea>

            <br><br>

            <label>Deadline</label>
            <br>

            <input type="date"
                   name="deadline">

            <br><br>

            <button type="submit">
                Add Task
            </button>

        </form>

    </div>

</div>

</body>
</html>
